root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
bin = "./tmp/bin/main"
cmd = "go build -o ./tmp/bin/main cmd/server/main.go"
delay = 100
exclude_dir = ["assets", "tmp", "vendor", "testdata", "tailwind"]
exclude_file = []
exclude_regex = ["_test.go", ".*_templ.go"]
exclude_unchanged = false
follow_symlink = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "templ", "html"]
kill_delay = "0s"
log = "build-errors.log"
send_interrupt = false
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
time = false

[misc]
clean_on_exit = true

[proxy]
app_port = 4040
enabled = true
proxy_port = 4041

[screen]
clear_on_rebuild = false
keep_scroll = true
